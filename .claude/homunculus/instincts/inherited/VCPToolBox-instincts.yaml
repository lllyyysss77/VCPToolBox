# VCPToolBox Workflow Update Dashboard Card Feature

## Action

Follow the update-dashboard-card-feature workflow:
1. Edit or add Vue component in src/components/dashboard (e.g., CpuCard.vue, CalendarCard.vue)
2. Update dashboard/core files (e.g., builtinCards.ts, builtinComponentMap.ts)
3. Modify or add related API files (e.g., src/api/*.ts, routes/admin/*.js, routes/*.js)
4. Update composables or types if needed (e.g., useDashboardState.ts, types/api.*.ts)
5. Update or add documentation in docs/ (e.g., DOCUMENTATION_INDEX.md, feature-specific docs)
6. Build project, generating new dist/assets/js and dist/assets/css files
7. Update dist/index.html

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: AdminPanel-Vue/src/components/dashboard/*.vue, AdminPanel-Vue/src/dashboard/core/*.ts, AdminPanel-Vue/src/api/*.ts

